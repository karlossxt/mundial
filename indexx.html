<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos personalizados mínimos para mejorar inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen pb-16">

    <!-- Encabezado con degradado deportivo -->
    <header class="bg-gradient-to-r from-emerald-600 via-teal-700 to-cyan-800 text-white py-8 px-4 text-center shadow-lg relative border-b-4 border-emerald-500">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight drop-shadow-md">🏆 QUINIELA MUNDIAL 2026</h1>
        <p class="text-sm mt-2 text-teal-100 font-medium">Fase de Grupos • Dos Jugadores</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-8">
        
        <!-- Configuración de Jugadores y Marcador de Puntos -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Usuario 1 (Verde) -->
            <div class="bg-slate-800 border-2 border-emerald-500 rounded-xl p-6 shadow-md flex items-center justify-between">
                <div>
                    <label class="text-xs text-emerald-400 font-semibold tracking-wider uppercase block mb-1">Jugador 1</label>
                    <input type="text" id="name-user1" value="Usuario 1" oninput="updateNames()" 
                           class="bg-slate-700 border border-slate-600 rounded px-3 py-1 font-bold text-white text-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 w-full sm:w-auto">
                </div>
                <div class="text-right">
                    <span class="text-xs text-slate-400 block font-semibold uppercase">Puntos</span>
                    <span id="score-user1" class="text-4xl font-black text-emerald-400">0</span>
                </div>
            </div>

            <!-- Usuario 2 (Morado) -->
            <div class="bg-slate-800 border-2 border-indigo-500 rounded-xl p-6 shadow-md flex items-center justify-between">
                <div>
                    <label class="text-xs text-indigo-400 font-semibold tracking-wider uppercase block mb-1">Jugador 2</label>
                    <input type="text" id="name-user2" value="Usuario 2" oninput="updateNames()" 
                           class="bg-slate-700 border border-slate-600 rounded px-3 py-1 font-bold text-white text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full sm:w-auto">
                </div>
                <div class="text-right">
                    <span class="text-xs text-slate-400 block font-semibold uppercase">Puntos</span>
                    <span id="score-user2" class="text-4xl font-black text-indigo-400">0</span>
                </div>
            </div>
        </section>

        <!-- Barra de Configuración de Administrador -->
        <section class="bg-slate-800 border border-slate-700 rounded-xl p-4 mb-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <span class="text-amber-500 text-xl">⚙️</span>
                <div>
                    <h3 class="font-bold text-sm">Controles de Administrador</h3>
                    <p class="text-xs text-slate-400">Activa este modo para registrar los marcadores reales de los partidos.</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs font-semibold text-slate-300">Modo Admin</span>
                <button id="toggle-admin" onclick="toggleAdminMode()" class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-slate-600">
                    <span id="toggle-dot" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-0"></span>
                </button>
            </div>
        </section>

        <!-- Contenedor Principal de Partidos -->
        <div id="matches-container" class="space-y-8">
            <!-- Los partidos agrupados por fecha se generarán con JavaScript -->
        </div>

    </main>

    <script>
        // Listado de partidos proporcionado por el usuario
        const matchesData = [
            // Jueves, 18 de Junio, 2026
            { id: 1, date: "Jueves, 18 de Junio, 2026", time: "EN VIVO", venue: "BC Place, Vancouver, Canadá", teamA: "Canadá", flagA: "🇨🇦", teamB: "Qatar", flagB: "🇶🇦" },
            { id: 2, date: "Jueves, 18 de Junio, 2026", time: "7:00 PM", venue: "Estadio Akron, Guadalajara, México", teamA: "México", flagA: "🇲🇽", teamB: "Corea del Sur", flagB: "🇰🇷" },
            { id: 3, date: "Jueves, 18 de Junio, 2026", time: "Finalizado", venue: "Mercedes-Benz Stadium, Atlanta, Georgia, EUA", teamA: "Chequia", flagA: "🇨🇿", teamB: "Sudáfrica", flagB: "🇿🇦", defaultRealA: 1, defaultRealB: 1 },
            { id: 4, date: "Jueves, 18 de Junio, 2026", time: "Finalizado", venue: "SoFi Stadium, Inglewood, California, EUA", teamA: "Suiza", flagA: "🇨🇭", teamB: "Bosnia y Herzegovina", flagB: "🇧🇦", defaultRealA: 4, defaultRealB: 1 },
            
            // Viernes, 19 de Junio, 2026
            { id: 5, date: "Viernes, 19 de Junio, 2026", time: "1:00 PM", venue: "Lumen Field, Seattle, Washington, EUA", teamA: "Estados Unidos", flagA: "🇺🇸", teamB: "Australia", flagB: "🇦🇺" },
            { id: 6, date: "Viernes, 19 de Junio, 2026", time: "4:00 PM", venue: "Gillette Stadium, Foxborough, Massachusetts, EUA", teamA: "Escocia", flagA: "🏴󠁧󠁢󠁳🇪", teamB: "Marruecos", flagB: "🇲🇦" },
            { id: 7, date: "Viernes, 19 de Junio, 2026", time: "6:30 PM", venue: "Lincoln Financial Field, Philadelphia, Pennsylvania, EUA", teamA: "Brasil", flagA: "🇧🇷", teamB: "Haití", flagB: "🇭🇹" },
            { id: 8, date: "Viernes, 19 de Junio, 2026", time: "9:00 PM", venue: "Levi's Stadium, Santa Clara, California, EUA", teamA: "Turquía", flagA: "🇹🇷", teamB: "Paraguay", flagB: "🇵🇾" },
            
            // Sábado, 20 de Junio, 2026
            { id: 9, date: "Sábado, 20 de Junio, 2026", time: "11:00 AM", venue: "NRG Stadium, Houston, Texas, EUA", teamA: "Países Bajos", flagA: "🇳🇱", teamB: "Suecia", flagB: "🇸🇪" },
            { id: 10, date: "Sábado, 20 de Junio, 2026", time: "2:00 PM", venue: "BMO Field, Toronto, Canadá", teamA: "Alemania", flagA: "🇩🇪", teamB: "Costa de Marfil", flagB: "🇨🇮" },
            { id: 11, date: "Sábado, 20 de Junio, 2026", time: "6:00 PM", venue: "GEHA Field at Arrowhead Stadium, Kansas City, Missouri, EUA", teamA: "Ecuador", flagA: "🇪🇨", teamB: "Curacao", flagB: "🇨🇼" },
            { id: 12, date: "Sábado, 20 de Junio, 2026", time: "10:00 PM", venue: "Estadio BBVA, Guadalupe, México", teamA: "Túnez", flagA: "🇹🇳", teamB: "Japón", flagB: "🇯🇵" },
            
            // Domingo, 21 de Junio, 2026
            { id: 13, date: "Domingo, 21 de Junio, 2026", time: "10:00 AM", venue: "Mercedes-Benz Stadium, Atlanta, Georgia, EUA", teamA: "España", flagA: "🇪🇸", teamB: "Arabia Saudita", flagB: "🇸🇦" },
            { id: 14, date: "Domingo, 21 de Junio, 2026", time: "1:00 PM", venue: "SoFi Stadium, Inglewood, California, EUA", teamA: "Bélgica", flagA: "🇧🇪", teamB: "Irán", flagB: "🇮🇷" },
            { id: 15, date: "Domingo, 21 de Junio, 2026", time: "4:00 PM", venue: "Hard Rock Stadium, Miami Gardens, Florida, EUA", teamA: "Uruguay", flagA: "🇺🇾", teamB: "Cabo Verde", flagB: "🇨🇻" },
            { id: 16, date: "Domingo, 21 de Junio, 2026", time: "7:00 PM", venue: "BC Place, Vancouver, Canadá", teamA: "Nueva Zelanda", flagA: "🇳🇿", teamB: "Egipto", flagB: "🇪🇬" },
            
            // Lunes, 22 de Junio, 2026
            { id: 17, date: "Lunes, 22 de Junio, 2026", time: "11:00 AM", venue: "AT&T Stadium, Arlington, Texas, EUA", teamA: "Argentina", flagA: "🇦🇷", teamB: "Austria", flagB: "🇦🇹" },
            { id: 18, date: "Lunes, 22 de Junio, 2026", time: "3:00 PM", venue: "Lincoln Financial Field, Philadelphia, Pennsylvania, EUA", teamA: "Francia", flagA: "🇫🇷", teamB: "Irak", flagB: "🇮🇶" },
            { id: 19, date: "Lunes, 22 de Junio, 2026", time: "6:00 PM", venue: "MetLife Stadium, East Rutherford, New Jersey, EUA", teamA: "Noruega", flagA: "🇳🇴", teamB: "Senegal", flagB: "🇸🇳" },
            { id: 20, date: "Lunes, 22 de Junio, 2026", time: "9:00 PM", venue: "Levi's Stadium, Santa Clara, California, EUA", teamA: "Jordania", flagA: "🇯🇴", teamB: "Argelia", flagB: "🇩🇿" },
            
            // Martes, 23 de Junio, 2026
            { id: 21, date: "Martes, 23 de Junio, 2026", time: "11:00 AM", venue: "NRG Stadium, Houston, Texas, EUA", teamA: "Portugal", flagA: "🇵🇹", teamB: "Uzbekistán", flagB: "🇺🇿" },
            { id: 22, date: "Martes, 23 de Junio, 2026", time: "2:00 PM", venue: "Gillette Stadium, Foxborough, Massachusetts, EUA", teamA: "Inglaterra", flagA: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", teamB: "Ghana", flagB: "🇬🇭" },
            { id: 23, date: "Martes, 23 de Junio, 2026", time: "5:00 PM", venue: "BMO Field, Toronto, Canadá", teamA: "Panamá", flagA: "🇵🇦", teamB: "Croacia", flagB: "🇭🇷" },
            { id: 24, date: "Martes, 23 de Junio, 2026", time: "8:00 PM", venue: "Estadio Akron, Guadalajara, México", teamA: "Colombia", flagA: "🇨🇴", teamB: "RD del Congo", flagB: "🇨🇩" },
            
            // Miércoles, 24 de Junio, 2026
            { id: 25, date: "Miércoles, 24 de Junio, 2026", time: "1:00 PM", venue: "Lumen Field, Seattle, Washington, EUA", teamA: "Bosnia y Herzegovina", flagA: "🇧🇦", teamB: "Qatar", flagB: "🇶🇦" },
            { id: 26, date: "Miércoles, 24 de Junio, 2026", time: "1:00 PM", venue: "BC Place, Vancouver, Canadá", teamA: "Suiza", flagA: "🇨🇭", teamB: "Canadá", flagB: "🇨🇦" },
            { id: 27, date: "Miércoles, 24 de Junio, 2026", time: "4:00 PM", venue: "Mercedes-Benz Stadium, Atlanta, Georgia, EUA", teamA: "Marruecos", flagA: "🇲🇦", teamB: "Haití", flagB: "🇭🇹" },
            { id: 28, date: "Miércoles, 24 de Junio, 2026", time: "4:00 PM", venue: "Hard Rock Stadium, Miami Gardens, Florida, EUA", teamA: "Escocia", flagA: "🏴󠁧󠁢󠁳🇪", teamB: "Brasil", flagB: "🇧🇷" },
            { id: 29, date: "Miércoles, 24 de Junio, 2026", time: "7:00 PM", venue: "Estadio Banorte, Ciudad de México, México", teamA: "Chequia", flagA: "🇨🇿", teamB: "México", flagB: "🇲🇽" },
            { id: 30, date: "Miércoles, 24 de Junio, 2026", time: "7:00 PM", venue: "Estadio BBVA, Guadalupe, México", teamA: "Sudáfrica", flagA: "🇿🇦", teamB: "Corea del Sur", flagB: "🇰🇷" }
        ];

        // Estado inicial de la aplicación
        let state = {
            adminMode: false,
            userNames: { user1: "Usuario 1", user2: "Usuario 2" },
            predictions: {}, // Estructura: { id_partido: { user1: { A, B }, user2: { A, B } } }
            realResults: {}  // Estructura: { id_partido: { A, B } }
        };

        // Cargar datos guardados del navegador si existen
        function loadState() {
            const saved = localStorage.getItem('quinielaState_2026');
            if (saved) {
                try {
                    state = JSON.parse(saved);
                } catch (e) {
                    console.error("Error al cargar datos locales, reiniciando.", e);
                }
            }
            
            // Asegurar que los partidos por defecto tengan cargado su resultado real
            matchesData.forEach(match => {
                if (match.defaultRealA !== undefined && match.defaultRealB !== undefined) {
                    if (!state.realResults[match.id]) {
                        state.realResults[match.id] = { A: match.defaultRealA, B: match.defaultRealB };
                    }
                }
            });

            // Sincronizar inputs de nombres de usuarios
            document.getElementById('name-user1').value = state.userNames.user1 || "Usuario 1";
            document.getElementById('name-user2').value = state.userNames.user2 || "Usuario 2";
            
            // Sincronizar botón de modo administrador
            updateAdminToggleButton();
        }

        // Guardar estado actual
        function saveState() {
            localStorage.setItem('quinielaState_2026', JSON.stringify(state));
        }

        // Cambiar estado del modo Administrador
        function toggleAdminMode() {
            state.adminMode = !state.adminMode;
            updateAdminToggleButton();
            saveState();
            renderAll();
        }

        function updateAdminToggleButton() {
            const btn = document.getElementById('toggle-admin');
            const dot = document.getElementById('toggle-dot');
            if (state.adminMode) {
                btn.classList.remove('bg-slate-600');
                btn.classList.add('bg-amber-500');
                dot.classList.remove('translate-x-0');
                dot.classList.add('translate-x-5');
            } else {
                btn.classList.remove('bg-amber-500');
                btn.classList.add('bg-slate-600');
                dot.classList.remove('translate-x-5');
                dot.classList.add('translate-x-0');
            }
        }

        // Actualizar nombres dinámicamente
        function updateNames() {
            state.userNames.user1 = document.getElementById('name-user1').value || "Usuario 1";
            state.userNames.user2 = document.getElementById('name-user2').value || "Usuario 2";
            saveState();
            
            // Actualizar etiquetas en las tarjetas de partidos sin re-renderizar todo
            document.querySelectorAll('.label-user1').forEach(el => el.innerText = state.userNames.user1);
            document.querySelectorAll('.label-user2').forEach(el => el.innerText = state.userNames.user2);
        }

        // Cambios en predicciones de los usuarios
        function handlePredictionChange(matchId, user, team, val) {
            if (!state.predictions[matchId]) {
                state.predictions[matchId] = { user1: { A: null, B: null }, user2: { A: null, B: null } };
            }
            const value = val !== "" ? parseInt(val) : null;
            state.predictions[matchId][user][team] = value;
            saveState();
            calculateScoresAndPoints();
        }

        // Cambios en los marcadores reales (Administrador)
        function handleRealChange(matchId, team, val) {
            if (!state.realResults[matchId]) {
                state.realResults[matchId] = { A: null, B: null };
            }
            const value = val !== "" ? parseInt(val) : null;
            state.realResults[matchId][team] = value;
            saveState();
            calculateScoresAndPoints();
        }

        // Lógica de cálculo de puntuación para cada usuario
        function getPointsForMatch(pred, real) {
            if (!real || real.A === null || real.B === null) return null; // Pendiente de jugar
            if (!pred || pred.A === null || pred.B === null) return 0;    // El usuario no pronosticó

            // Marcador exacto: 3 puntos
            if (pred.A === real.A && pred.B === real.B) {
                return 3;
            }

            // Ganador o empate: 1 punto
            const predOutcome = pred.A > pred.B ? 'A' : (pred.A < pred.B ? 'B' : 'Draw');
            const realOutcome = real.A > real.B ? 'A' : (real.A < real.B ? 'B' : 'Draw');

            if (predOutcome === realOutcome) {
                return 1;
            }

            return 0;
        }

        // Recalcular puntos totales y actualizar badges
        function calculateScoresAndPoints() {
            let totalUser1 = 0;
            let totalUser2 = 0;

            matchesData.forEach(match => {
                const pred = state.predictions[match.id] || { user1: { A: null, B: null }, user2: { A: null, B: null } };
                const real = state.realResults[match.id];

                // Usuario 1
                const pts1 = getPointsForMatch(pred.user1, real);
                const badge1 = document.getElementById(`badge-u1-${match.id}`);
                if (badge1) updateMatchBadge(badge1, pts1);
                if (pts1 !== null) totalUser1 += pts1;

                // Usuario 2
                const pts2 = getPointsForMatch(pred.user2, real);
                const badge2 = document.getElementById(`badge-u2-${match.id}`);
                if (badge2) updateMatchBadge(badge2, pts2);
                if (pts2 !== null) totalUser2 += pts2;

                // Actualizar resumen real en la tarjeta (cuando el modo admin está apagado)
                const realSummaryText = document.getElementById(`real-summary-${match.id}`);
                if (realSummaryText) {
                    if (real && real.A !== null && real.B !== null) {
                        realSummaryText.innerHTML = `<span class="bg-amber-500/10 text-amber-400 text-xs px-2.5 py-1 rounded-full font-bold border border-amber-500/20">Real: ${real.A} - ${real.B}</span>`;
                    } else {
                        realSummaryText.innerHTML = `<span class="bg-slate-700 text-slate-400 text-xs px-2.5 py-1 rounded-full font-medium">No jugado</span>`;
                    }
                }
            });

            document.getElementById('score-user1').innerText = totalUser1;
            document.getElementById('score-user2').innerText = totalUser2;
        }

        function updateMatchBadge(element, points) {
            if (points === null) {
                element.className = "hidden";
            } else if (points === 3) {
                element.className = "inline-flex items-center gap-1 bg-green-500/20 text-green-400 text-xs font-bold px-2 py-0.5 rounded border border-green-500/30";
                element.innerHTML = "🎯 +3 pts";
            } else if (points === 1) {
                element.className = "inline-flex items-center gap-1 bg-blue-500/20 text-blue-400 text-xs font-semibold px-2 py-0.5 rounded border border-blue-500/30";
                element.innerHTML = "👍 +1 pt";
            } else {
                element.className = "inline-flex items-center gap-1 bg-rose-500/10 text-rose-400 text-xs font-medium px-2 py-0.5 rounded border border-rose-500/20";
                element.innerHTML = "❌ 0 pts";
            }
        }

        // Renderizar todos los elementos de la web
        function renderAll() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            // Agrupar partidos por fecha
            const grouped = {};
            matchesData.forEach(match => {
                if (!grouped[match.date]) {
                    grouped[match.date] = [];
                }
                grouped[match.date].push(match);
            });

            // Generar HTML por grupo de fecha
            for (const [date, matches] of Object.entries(grouped)) {
                let dateHtml = `
                    <div class="space-y-4">
                        <div class="flex items-center gap-2 border-b border-slate-700 pb-2">
                            <span class="text-emerald-500 text-lg">📅</span>
                            <h2 class="text-lg font-bold text-slate-300">${date}</h2>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                `;

                matches.forEach(match => {
                    const pred = state.predictions[match.id] || { user1: { A: null, B: null }, user2: { A: null, B: null } };
                    const real = state.realResults[match.id] || { A: null, B: null };

                    const valU1A = pred.user1.A !== null ? pred.user1.A : '';
                    const valU1B = pred.user1.B !== null ? pred.user1.B : '';
                    const valU2A = pred.user2.A !== null ? pred.user2.A : '';
                    const valU2B = pred.user2.B !== null ? pred.user2.B : '';
                    const valRealA = real.A !== null ? real.A : '';
                    const valRealB = real.B !== null ? real.B : '';

                    dateHtml += `
                        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-sm hover:border-slate-600 transition">
                            
                            <!-- Cabecera de la Tarjeta del Partido -->
                            <div class="bg-slate-800/60 px-4 py-2 flex flex-wrap items-center justify-between gap-2 border-b border-slate-700/50">
                                <span class="text-xs text-slate-400 font-medium">${match.time} • ${match.venue}</span>
                                <div id="real-summary-${match.id}"></div>
                            </div>

                            <div class="p-4 md:p-6 flex flex-col lg:flex-row items-center justify-between gap-6">
                                
                                <!-- Sección Equipos (Visual) -->
                                <div class="flex items-center justify-center gap-4 w-full lg:w-1/3">
                                    <div class="flex items-center gap-2 justify-end w-5/12 text-right">
                                        <span class="font-bold text-sm md:text-base text-slate-100">${match.teamA}</span>
                                        <span class="text-2xl md:text-3xl">${match.flagA}</span>
                                    </div>
                                    <span class="text-xs font-bold text-slate-500 bg-slate-700 px-2 py-0.5 rounded">VS</span>
                                    <div class="flex items-center gap-2 justify-start w-5/12 text-left">
                                        <span class="text-2xl md:text-3xl">${match.flagB}</span>
                                        <span class="font-bold text-sm md:text-base text-slate-100">${match.teamB}</span>
                                    </div>
                                </div>

                                <!-- Sección Pronósticos Usuarios -->
                                <div class="flex flex-col sm:flex-row items-center gap-4 w-full lg:w-2/3 justify-end">
                                    
                                    <!-- Usuario 1 (Verde) -->
                                    <div class="flex items-center justify-between sm:justify-end gap-3 bg-emerald-950/20 border border-emerald-500/20 rounded-lg px-4 py-2 w-full sm:w-auto">
                                        <div class="text-left sm:text-right">
                                            <span class="label-user1 text-xs font-extrabold text-emerald-400 block">${state.userNames.user1}</span>
                                            <div id="badge-u1-${match.id}"></div>
                                        </div>
                                        <div class="flex items-center gap-1">
                                            <input type="number" min="0" placeholder="-" 
                                                value="${valU1A}" 
                                                oninput="handlePredictionChange(${match.id}, 'user1', 'A', this.value)"
                                                class="w-10 h-10 text-center font-black bg-slate-900 border border-emerald-500/40 rounded text-emerald-400 focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                                            <span class="text-slate-500 font-bold">:</span>
                                            <input type="number" min="0" placeholder="-" 
                                                value="${valU1B}" 
                                                oninput="handlePredictionChange(${match.id}, 'user1', 'B', this.value)"
                                                class="w-10 h-10 text-center font-black bg-slate-900 border border-emerald-500/40 rounded text-emerald-400 focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                                        </div>
                                    </div>

                                    <!-- Usuario 2 (Morado) -->
                                    <div class="flex items-center justify-between sm:justify-end gap-3 bg-indigo-950/20 border border-indigo-500/20 rounded-lg px-4 py-2 w-full sm:w-auto">
                                        <div class="text-left sm:text-right">
                                            <span class="label-user2 text-xs font-extrabold text-indigo-400 block">${state.userNames.user2}</span>
                                            <div id="badge-u2-${match.id}"></div>
                                        </div>
                                        <div class="flex items-center gap-1">
                                            <input type="number" min="0" placeholder="-" 
                                                value="${valU2A}" 
                                                oninput="handlePredictionChange(${match.id}, 'user2', 'A', this.value)"
                                                class="w-10 h-10 text-center font-black bg-slate-900 border border-indigo-500/40 rounded text-indigo-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                            <span class="text-slate-500 font-bold">:</span>
                                            <input type="number" min="0" placeholder="-" 
                                                value="${valU2B}" 
                                                oninput="handlePredictionChange(${match.id}, 'user2', 'B', this.value)"
                                                class="w-10 h-10 text-center font-black bg-slate-900 border border-indigo-500/40 rounded text-indigo-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                        </div>
                                    </div>

                                </div>
                            </div>

                            <!-- Panel de Resultados Reales (Modo Admin) -->
                            <div class="${state.adminMode ? 'block' : 'hidden'} bg-amber-950/25 border-t border-amber-500/20 p-3 flex items-center justify-between">
                                <span class="text-xs font-bold text-amber-500 flex items-center gap-1">
                                    <span>⚠️</span> MODO ADMIN: Resultado Real
                                </span>
                                <div class="flex items-center gap-1">
                                    <input type="number" min="0" placeholder="-" 
                                        value="${valRealA}" 
                                        oninput="handleRealChange(${match.id}, 'A', this.value)"
                                        class="w-10 h-8 text-center font-bold bg-slate-950 border border-amber-500/40 text-amber-500 rounded text-sm focus:ring-1 focus:ring-amber-500 focus:outline-none">
                                    <span class="text-amber-500/60 font-bold">-</span>
                                    <input type="number" min="0" placeholder="-" 
                                        value="${valRealB}" 
                                        oninput="handleRealChange(${match.id}, 'B', this.value)"
                                        class="w-10 h-8 text-center font-bold bg-slate-950 border border-amber-500/40 text-amber-500 rounded text-sm focus:ring-1 focus:ring-amber-500 focus:outline-none">
                                </div>
                            </div>

                        </div>
                    `;
                });

                dateHtml += `
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', dateHtml);
            }

            // Una vez renderizados todos, calcular puntuaciones y rellenar insignias
            calculateScoresAndPoints();
        }

        // Ejecución inicial de la aplicación
        loadState();
        renderAll();
    </script>
</body>
</html>
