                    save(); 
                    location.reload(); 
                }

            }
        }

            }
        }

                    state.adminMode = data.adminMode ?? false;
                    state.userNames = data.userNames ?? { user1: "Usuario 1", user2: "Usuario 2" };

            } finally {
                document.getElementById('name-user1').value = state.userNames.user1;
                document.getElementById('name-user2').value = state.userNames.user2;
                updateAdminUI();
                render();
            }
        }

        function updateScores() {
            let s1 = 0, s2 = 0;
            matchesData.forEach(m => {
                const real = state.realResults[m.id];
                const pred = state.predictions[m.id];
                if (real && real.A !== null && real.B !== null) {
                    if (pred) {
                        s1 += calcPts(pred.user1, real, m.id, 1);
                        s2 += calcPts(pred.user2, real, m.id, 2);
                    }
                    const resDiv = document.getElementById(`res-${m.id}`);
                    if (resDiv) resDiv.innerText = `REAL: ${real.A} - ${real.B}`;
                }
            });
            document.getElementById('score-user1').innerText = s1;
            document.getElementById('score-user2').innerText = s2;
        }

        function calcPts(p, r, mid, uNum) {
            if (!p || p.A === null || p.B === null) return 0;
            let pts = 0;
            if (p.A === r.A && p.B === r.B) pts = 3;
            else {
                const pW = p.A > p.B ? 'A' : (p.A < p.B ? 'B' : 'E');
                const rW = r.A > r.B ? 'A' : (r.A < r.B ? 'B' : 'E');
                if (pW === rW) pts = 1;
            }
            const el = document.getElementById(`pts-u${uNum}-${mid}`);
            if (el) {
                el.innerText = pts === 3 ? "рџЋЇ +3" : (pts === 1 ? "рџ‘Ќ +1" : "вќЊ 0");
                el.className = `text-[10px] font-black mt-1 px-2 rounded ${pts === 3 ? 'text-emerald-400 bg-emerald-500/10' : (pts === 1 ? 'text-blue-400 bg-blue-500/10' : 'text-rose-400 bg-rose-500/10')}`;
            }
            return pts;
        }

        function updateAdminUI() {
            const dot = document.getElementById('toggle-dot');
            const btn = document.getElementById('toggle-admin');
            if (state.adminMode) { 
                dot.classList.add('translate-x-6'); 
                dot.classList.remove('translate-x-1');
                btn.classList.add('bg-amber-600'); 
                btn.classList.remove('bg-slate-600');
            } else { 
                dot.classList.add('translate-x-1'); 
                dot.classList.remove('translate-x-6');
                btn.classList.add('bg-slate-600'); 
                btn.classList.remove('bg-amber-600');
            }
        }

        function render() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            const groups = {};
            matchesData.forEach(m => { if (!groups[m.date]) groups[m.date] = []; groups[m.date].push(m); });

            for (const date in groups) {
                // Se utiliza una normalizaciГіn para quitar tildes y caracteres especiales de manera correcta.
                const sectionId = date
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .replace(/[^a-zA-Z0-9]/g, "");

                let html = `<div id="section-${sectionId}" class="mb-8"><h2 class="text-xs font-black text-emerald-500 mb-4 border-b border-slate-800 pb-2 uppercase tracking-widest">рџ“… ${date}</h2><div class="grid gap-4">`;
                groups[date].forEach(m => {
                    const p = state.predictions[m.id] || { user1: { A: '', B: '' }, user2: { A: '', B: '' } };
                    const r = state.realResults[m.id] || { A: '', B: '' };
                    
                    const infoHtml = m.time ? `
                        <div class="mt-3 pt-2 border-t border-slate-700/40 text-[9px] text-slate-400 flex flex-wrap gap-x-4 gap-y-1 justify-center md:justify-start">
                            <span>рџ•’ <b>Hora:</b> ${m.time} (Centro MX)</span>
                            <span>рџЏџпёЏ <b>Estadio:</b> ${m.stadium}</span>
                            <span>рџ“є <b>TV:</b> ${m.tv}</span>
                        </div>
                    ` : '';

                    html += `
                        <div class="bg-slate-800/80 rounded-xl p-4 border border-slate-700/50">
                            <div class="flex justify-between mb-4">
                                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">${m.group}</span>
                                <span id="res-${m.id}" class="text-[10px] font-bold text-amber-500"></span>
                            </div>
                            <div class="flex flex-col md:flex-row gap-4 items-center">
                                <div class="flex items-center justify-center gap-4 w-full md:w-1/3">
                                    <div class="text-center w-1/2">
                                        <div class="text-2xl">${m.flagA}</div>
                                        <div class="text-[10px] font-black uppercase truncate">${m.teamA}</div>
                                    </div>
                                    <div class="text-slate-700 text-[10px] font-black italic">VS</div>
                                    <div class="text-center w-1/2">
                                        <div class="text-2xl">${m.flagB}</div>
                                        <div class="text-[10px] font-black uppercase truncate">${m.teamB}</div>
                                    </div>
                                </div>
                                <div class="flex gap-3 w-full md:w-2/3 justify-center md:justify-end">
                                    <div class="bg-slate-900 p-2 rounded-lg border-t-2 border-emerald-500 flex flex-col items-center min-w-[70px]">
                                        <span class="text-[8px] font-bold text-emerald-400 mb-1 truncate w-16 text-center">${state.userNames.user1}</span>
                                        <div class="flex gap-1">
                                            <input type="number" value="${p.user1?.A ?? ''}" oninput="handleInput(${m.id},'user1','A',this.value)" class="w-7 h-8 bg-slate-800 rounded text-center text-xs font-bold outline-none text-emerald-400">
                                            <input type="number" value="${p.user1?.B ?? ''}" oninput="handleInput(${m.id},'user1','B',this.value)" class="w-7 h-8 bg-slate-800 rounded text-center text-xs font-bold outline-none text-emerald-400">
                                        </div>
                                        <div id="pts-u1-${m.id}"></div>
                                    </div>
                                    <div class="bg-slate-900 p-2 rounded-lg border-t-2 border-indigo-500 flex flex-col items-center min-w-[70px]">
                                        <span class="text-[8px] font-bold text-indigo-400 mb-1 truncate w-16 text-center">${state.userNames.user2}</span>
                                        <div class="flex gap-1">
                                            <input type="number" value="${p.user2?.A ?? ''}" oninput="handleInput(${m.id},'user2','A',this.value)" class="w-7 h-8 bg-slate-800 rounded text-center text-xs font-bold outline-none text-indigo-400">
                                            <input type="number" value="${p.user2?.B ?? ''}" oninput="handleInput(${m.id},'user2','B',this.value)" class="w-7 h-8 bg-slate-800 rounded text-center text-xs font-bold outline-none text-indigo-400">
                                        </div>
                                        <div id="pts-u2-${m.id}"></div>
                                    </div>
                                </div>
                            </div>
                            ${infoHtml}
                            <div class="${state.adminMode ? 'flex' : 'hidden'} mt-4 pt-3 border-t border-slate-700 justify-between items-center">
                                <span class="text-[9px] font-bold text-amber-600">ADMIN REAL:</span>
                                <div class="flex gap-1">
                                    <input type="number" value="${r.A ?? ''}" oninput="handleReal(${m.id},'A',this.value)" class="w-7 h-7 bg-amber-500/10 border border-amber-500/20 rounded text-center text-xs text-amber-500 outline-none">
                                    <input type="number" value="${r.B ?? ''}" oninput="handleReal(${m.id},'B',this.value)" class="w-7 h-7 bg-amber-500/10 border border-amber-500/20 rounded text-center text-xs text-amber-500 outline-none">
                                </div>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.insertAdjacentHTML('beforeend', html);
            }
            updateScores();

            // Desplazamiento manual en caso de que exista un hash en la URL al renderizar los datos
            if (window.location.hash) {
                const targetEl = document.getElementById(window.location.hash.substring(1));
                if (targetEl) {
                    setTimeout(() => {
                        targetEl.scrollIntoView({ behavior: 'smooth' });
                    }, 150);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>
</html>
